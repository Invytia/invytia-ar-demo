<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invytia - Experiencia AR</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        /* Estilo para el botón de inicio (Necesario por restricciones de audio en navegadores) */
        #ui-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #start-button {
            padding: 15px 35px;
            background-color: #1a4f36; /* Verde bosque del sello */
            color: #ffffff;
            border: 2px solid #d4af37; /* Toque dorado */
            border-radius: 50px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        #start-button:active {
            transform: scale(0.95);
        }

        /* Ocultar la marca de agua de AR.js para una experiencia más limpia */
        .arjs-loader {
            display: none !important;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="ui-overlay">
        <button id="start-button">VER MENSAJE ESPECIAL</button>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
        renderer="logarithmicDepthBuffer: true;"
        vr-mode-ui="enabled: false">

        <a-assets>
            <video 
                id="video-invytia" 
                src="mensaje.webm" 
                preload="auto" 
                loop="false" 
                crossorigin="anonymous" 
                playsinline 
                webkit-playsinline>
            </video>
        </a-assets>

        <a-marker type="pattern" url="sello.patt">
            
            <a-video 
                src="#video-invytia" 
                width="1" 
                height="1.77" 
                position="0 0.5 0" 
                rotation="-90 0 0">
            </a-video>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

    <script>
        const btn = document.querySelector('#start-button');
        const video = document.querySelector('#video-invytia');

        btn.addEventListener('click', () => {
            // Reproducir video y ocultar botón
            video.play();
            document.querySelector('#ui-overlay').style.display = 'none';
        });

        // Asegurar que el video se resetee si se pierde el marcador (opcional)
        const marker = document.querySelector('a-marker');
        marker.addEventListener('markerLost', () => {
            video.pause();
        });
        marker.addEventListener('markerFound', () => {
            if (document.querySelector('#ui-overlay').style.display === 'none') {
                video.play();
            }
        });
    </script>
</body>
</html>
